name: lvlup_habit_tracker_ai_coach
description: "LvlUp - RPG Habit Tracker"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend and state management
  supabase_flutter: ^2.3.4
  provider: ^6.1.2
  flutter_dotenv: ^5.1.0
  
  # Navigation
  go_router: ^13.2.0
  
  # UI and styling
  google_fonts: ^6.2.1
  
  # Security and storage
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # Image picker for quest proofs
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
