<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/LvlUp/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LvlUp - RPG Habit Tracker. Level up your life through gamified habit tracking.">
  <meta name="keywords" content="habit tracker, RPG, gamification, productivity, goals, self-improvement">
  <meta name="author" content="LvlUp">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://0zKazekai.github.io/LvlUp/">
  <meta property="og:title" content="LvlUp - RPG Habit Tracker">
  <meta property="og:description" content="Level up your life through gamified habit tracking. Build better habits, earn XP, and unlock achievements.">
  <meta property="og:image" content="https://0zKazekai.github.io/LvlUp/assets/images/og-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://0zKazekai.github.io/LvlUp/">
  <meta property="twitter:title" content="LvlUp - RPG Habit Tracker">
  <meta property="twitter:description" content="Level up your life through gamified habit tracking.">
  <meta property="twitter:image" content="https://0zKazekai.github.io/LvlUp/assets/images/og-image.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LvlUp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">

  <!-- PWA meta tags -->
  <meta name="theme-color" content="#0A0E1A">
  <meta name="background-color" content="#0A0E1A">
  <meta name="display" content="standalone">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" href="favicon.png">

  <title>LvlUp - RPG Habit Tracker</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Preload critical resources -->
  <link rel="preload" href="flutter.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  
  <!-- Security headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co https://*.githubusercontent.com; connect-src 'self' https://*.supabase.co;">
</head>
<body>
  <!-- Loading indicator -->
  <div id="loading" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0A0E1A;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  ">
    <div style="
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #00E5FF, #8B5CF6);
      border-radius: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    ">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#0A0E1A"/>
      </svg>
    </div>
    <div style="color: #00E5FF; font-size: 18px; font-weight: bold; margin-bottom: 8px;">LvlUp</div>
    <div style="color: #94A3B8; font-size: 14px;">Loading your adventure...</div>
    <div style="
      width: 200px;
      height: 4px;
      background: #1E293B;
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
    ">
      <div style="
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #00E5FF, #8B5CF6);
        border-radius: 2px;
        animation: loading 2s infinite;
      "></div>
    </div>
  </div>

  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
  </style>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Hide loading indicator when Flutter app is ready
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          setTimeout(function() {
            loading.style.display = 'none';
          }, 500);
        }
      }, 1000);
    });

    // Register service worker for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          })
          .catch(function(error) {
            console.log('ServiceWorker registration failed: ', error);
          });
      });
    }
  </script>
</body>
</html>
