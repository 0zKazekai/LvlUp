name: Build and Deploy Web Demo

on:
  push:
    branches: [ main, master ]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'web/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Verify secrets are present
      run: |
        if [ -z "$SUPABASE_URL" ]; then
          echo "WARNING: SUPABASE_URL secret is not set — app will run in demo mode"
        else
          echo "SUPABASE_URL: set"
        fi
        if [ -z "$SUPABASE_ANON_KEY" ]; then
          echo "WARNING: SUPABASE_ANON_KEY secret is not set — app will run in demo mode"
        else
          echo "SUPABASE_ANON_KEY: set"
        fi
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    - name: Run tests
      run: flutter test || echo "Tests failed — continuing with build"

    - name: Build web app
      run: |
        flutter build web \
          --release \
          --web-renderer canvaskit \
          --no-tree-shake-icons \
          --base-href /${{ github.event.repository.name }}/ \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

    - name: Upload to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/web

  build-android:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: |
        flutter build apk --release \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: lvlup-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: Build App Bundle
      run: |
        flutter build appbundle --release \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

    - name: Upload App Bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: lvlup-android-bundle
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Build iOS (simulator)
      run: |
        flutter build ios --release --simulator \
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

    - name: Upload iOS build
      uses: actions/upload-artifact@v4
      with:
        name: lvlup-ios-build
        path: build/ios/Build/Products/Release-iphonesimulator/LvlUp.app
        retention-days: 30
