name: Build Web Demo (Simple)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Create environment file
      run: |
        echo "Creating environment file..."
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > lib/.env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> lib/.env
        echo "APP_ENV=production" >> lib/.env
        
        # Verify the file was created
        echo "Environment file contents:"
        cat lib/.env
        
        # Check if secrets are available
        if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
          echo "ERROR: SUPABASE_URL secret is missing!"
          echo "Please add SUPABASE_URL to your GitHub Secrets"
          exit 1
        fi
        
        if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
          echo "ERROR: SUPABASE_ANON_KEY secret is missing!"
          echo "Please add SUPABASE_ANON_KEY to your GitHub Secrets"
          exit 1
        fi
        
        echo "All secrets are available!"
        
    - name: Run tests
      run: flutter test --no-pub
      
    - name: Build web app
      run: |
        echo "Building web app..."
        flutter build web --release --web-renderer canvaskit
        echo "Web build completed!"
        
    - name: Upload to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build/web
        
    - name: Get deployment URL
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        echo "Web demo deployed at: https://0zKazekai.github.io/LvlUp/"
        echo "It may take a few minutes to become available."
